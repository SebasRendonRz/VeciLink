<div class="rating-form-card card border-0 shadow-sm p-4 mt-4">
  <h5 class="fw-bold mb-3"><i class="bi bi-star me-2 text-warning"></i>Calificar este servicio</h5>

  <app-alert *ngIf="successMessage" [message]="successMessage" type="success" (dismissed)="successMessage = ''"></app-alert>
  <app-alert *ngIf="errorMessage" [message]="errorMessage" type="danger" (dismissed)="errorMessage = ''"></app-alert>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    <!-- Selector de estrellas -->
    <div class="mb-3">
      <label class="form-label">Tu calificación</label>
      <div class="star-selector d-flex gap-1">
        <button
          *ngFor="let s of [1,2,3,4,5]"
          type="button"
          class="btn-star"
          (mouseenter)="hoveredStar = s"
          (mouseleave)="hoveredStar = 0"
          (click)="setStars(s)">
          <i class="bi fs-3"
            [class.bi-star-fill]="s <= (hoveredStar || form.value.stars)"
            [class.bi-star]="s > (hoveredStar || form.value.stars)"
            [class.text-warning]="s <= (hoveredStar || form.value.stars)"
            [class.text-muted]="s > (hoveredStar || form.value.stars)">
          </i>
        </button>
      </div>
    </div>

    <!-- Comentario -->
    <div class="mb-3">
      <label class="form-label">Comentario <span class="text-muted">(opcional)</span></label>
      <textarea class="form-control" formControlName="comment" rows="3"
        placeholder="Cuéntanos tu experiencia con este servicio..."></textarea>
    </div>

    <button type="submit" class="btn btn-warning fw-semibold" [disabled]="isSaving">
      <span *ngIf="isSaving" class="spinner-border spinner-border-sm me-2"></span>
      {{ isSaving ? 'Enviando...' : 'Enviar calificación' }}
    </button>
  </form>
</div>
