<div class="mt-4" *ngIf="total > 0">
  <h5 class="fw-bold mb-3"><i class="bi bi-chat-square-text me-2 text-primary"></i>Calificaciones ({{ total }})</h5>

  <div class="d-flex align-items-center gap-3 mb-4">
    <span class="display-5 fw-bold text-warning">{{ average }}</span>
    <div>
      <app-rating-stars [stars]="average" [interactive]="false"></app-rating-stars>
      <small class="text-muted">{{ total }} calificación{{ total !== 1 ? 'es' : '' }}</small>
    </div>
  </div>

  <div class="ratings-list d-flex flex-column gap-3">
    <div class="rating-item border rounded p-3" *ngFor="let r of ratings">
      <div class="d-flex justify-content-between align-items-center mb-1">
        <span class="fw-semibold">{{ r.userName || 'Usuario' }}</span>
        <small class="text-muted">{{ r.createdAt | date:'mediumDate' }}</small>
      </div>
      <app-rating-stars [stars]="r.stars" [interactive]="false"></app-rating-stars>
      <p class="text-muted small mt-1 mb-0" *ngIf="r.comment">{{ r.comment }}</p>
    </div>
  </div>
</div>

<div class="text-muted small mt-4" *ngIf="total === 0">
  <i class="bi bi-chat-square me-1"></i> Este servicio aún no tiene calificaciones.
</div>
