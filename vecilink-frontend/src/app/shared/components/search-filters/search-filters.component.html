<form [formGroup]="filterForm" class="search-filters-form">
  <div class="row g-2 align-items-end">
    <div class="col-12 col-md-5">
      <label class="form-label small fw-semibold">Buscar</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-search"></i></span>
        <input type="text" class="form-control" placeholder="Servicio, descripción..." formControlName="keyword">
      </div>
    </div>
    <div class="col-6 col-md-3">
      <label class="form-label small fw-semibold">Categoría</label>
      <select class="form-select" formControlName="categoryId">
        <option [ngValue]="null">Todas</option>
        @for (cat of categories; track cat.id) {
        <option [ngValue]="cat.id">{{ cat.name }}</option>
        }
      </select>
    </div>
    <div class="col-6 col-md-3">
      <label class="form-label small fw-semibold">Barrio</label>
      <input type="text" class="form-control" placeholder="Ej: El Poblado" formControlName="neighborhood">
    </div>
    <div class="col-12 col-md-1 d-flex align-items-end">
      <button type="button" class="btn btn-outline-secondary w-100" (click)="clearFilters()" title="Limpiar filtros">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>
  </div>
</form>
