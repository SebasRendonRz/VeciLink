<nav class="navbar navbar-expand-lg navbar-vecilink">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" routerLink="/">
      <img src="LogoVeciLink.png" alt="VeciLink" height="36">
    </a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarMain"
      aria-controls="navbarMain"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarMain">
      <!-- Links públicos -->
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">
            <i class="bi bi-house me-1"></i>Inicio
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/services" routerLinkActive="active" (click)="closeMenu()">
            <i class="bi bi-grid me-1"></i>Servicios
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/ranking" routerLinkActive="active" (click)="closeMenu()">
            <i class="bi bi-trophy me-1"></i>Ranking
          </a>
        </li>
      </ul>

      <!-- Links autenticado -->
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center">
        <ng-container *ngIf="currentUser; else guestLinks">

          <!-- Notificaciones -->
          <li class="nav-item">
            <a class="nav-link position-relative" routerLink="/notifications" routerLinkActive="active" (click)="closeMenu()">
              <i class="bi bi-bell me-1"></i>
              <span *ngIf="unreadCount > 0" class="badge-notif">{{ unreadCount }}</span>
            </a>
          </li>

          <!-- Favoritos -->
          <li class="nav-item">
            <a class="nav-link" routerLink="/favorites" routerLinkActive="active" (click)="closeMenu()">
              <i class="bi bi-heart me-1"></i>
            </a>
          </li>

          <!-- Panel prestador -->
          <li class="nav-item" *ngIf="isProvider">
            <a class="nav-link" routerLink="/provider" routerLinkActive="active" (click)="closeMenu()">
              <i class="bi bi-briefcase me-1"></i>Mi panel
            </a>
          </li>

          <!-- Panel admin -->
          <li class="nav-item" *ngIf="isAdmin">
            <a class="nav-link" routerLink="/admin" routerLinkActive="active" (click)="closeMenu()">
              <i class="bi bi-shield-check me-1"></i>Admin
            </a>
          </li>

          <!-- Menú usuario -->
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle d-flex align-items-center gap-1" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
              <i class="bi bi-person-circle fs-5"></i>
              <span class="d-none d-lg-inline">{{ firstName }}</span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" routerLink="/profile" (click)="closeMenu()"><i class="bi bi-person me-2"></i>Mi perfil</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><button class="dropdown-item text-danger" (click)="logout()"><i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión</button></li>
            </ul>
          </li>

        </ng-container>

        <ng-template #guestLinks>
          <li class="nav-item">
            <a class="nav-link" routerLink="/login" (click)="closeMenu()">
              <i class="bi bi-box-arrow-in-right me-1"></i>Ingresar
            </a>
          </li>
          <li class="nav-item">
            <a class="btn btn-primary btn-sm ms-2" routerLink="/register" (click)="closeMenu()">
              Registrarse
            </a>
          </li>
        </ng-template>
      </ul>
    </div>
  </div>
</nav>
