<app-admin-topbar title="Usuarios"></app-admin-topbar>

<div class="p-4">
  <app-alert *ngIf="alertMessage" [type]="alertType" [message]="alertMessage"
    (closed)="alertMessage = ''"></app-alert>

  <!-- Filters -->
  <div class="card border-0 shadow-sm p-3 mb-4">
    <div class="row g-2">
      <div class="col-sm-4">
        <select class="form-select form-select-sm" [(ngModel)]="filterRole" (change)="applyFilters()">
          <option value="">Todos los roles</option>
          <option value="citizen">Ciudadano</option>
          <option value="provider">Prestador</option>
          <option value="admin">Administrador</option>
        </select>
      </div>
      <div class="col-sm-4">
        <select class="form-select form-select-sm" [(ngModel)]="filterStatus" (change)="applyFilters()">
          <option value="">Todos los estados</option>
          <option value="true">Activo</option>
          <option value="false">Inactivo</option>
        </select>
      </div>
    </div>
  </div>

  <app-loader *ngIf="isLoading"></app-loader>

  <ng-container *ngIf="!isLoading">
    <div class="card border-0 shadow-sm">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>Nombre</th>
              <th>Correo</th>
              <th>Rol</th>
              <th>Estado</th>
              <th>Registro</th>
              <th class="text-end">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let user of filtered">
              <td class="fw-semibold">{{ user.fullName }}</td>
              <td class="text-muted small">{{ user.email }}</td>
              <td>
                <span class="badge rounded-pill"
                  [ngClass]="{
                    'bg-primary': user.role === 'citizen',
                    'bg-success': user.role === 'provider',
                    'bg-danger':  user.role === 'admin'
                  }">
                  {{ user.role === 'citizen' ? 'Ciudadano' : user.role === 'provider' ? 'Prestador' : 'Admin' }}
                </span>
              </td>
              <td>
                <span class="badge" [ngClass]="user.isActive ? 'bg-success' : 'bg-secondary'">
                  {{ user.isActive ? 'Activo' : 'Inactivo' }}
                </span>
              </td>
              <td class="text-muted small">{{ user.createdAt | date:'dd/MM/yyyy' }}</td>
              <td class="text-end">
                <button class="btn btn-sm me-1"
                  [ngClass]="user.isActive ? 'btn-outline-warning' : 'btn-outline-success'"
                  (click)="toggleStatus(user)" title="{{ user.isActive ? 'Desactivar' : 'Activar' }}">
                  <i class="bi" [ngClass]="user.isActive ? 'bi-person-x' : 'bi-person-check'"></i>
                </button>
                <button class="btn btn-sm btn-outline-danger" (click)="requestDelete(user.id)" title="Eliminar">
                  <i class="bi bi-trash"></i>
                </button>
              </td>
            </tr>
            <tr *ngIf="filtered.length === 0">
              <td colspan="6" class="text-center text-muted py-4">No se encontraron usuarios.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </ng-container>
</div>

<app-confirm-modal
  *ngIf="confirmDeleteId !== null"
  message="¿Estás seguro de que deseas eliminar este usuario? Esta acción no se puede deshacer."
  (confirmed)="confirmDelete()"
  (cancelled)="cancelDelete()">
</app-confirm-modal>
