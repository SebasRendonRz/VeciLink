<app-admin-topbar title="Servicios"></app-admin-topbar>

<div class="p-4">
  <app-alert *ngIf="alertMessage" [type]="alertType" [message]="alertMessage"
    (closed)="alertMessage = ''"></app-alert>

  <!-- Filter -->
  <div class="card border-0 shadow-sm p-3 mb-4">
    <div class="row g-2">
      <div class="col-sm-4">
        <select class="form-select form-select-sm" [(ngModel)]="filterCategory" (change)="applyFilters()">
          <option value="">Todas las categorías</option>
          <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
        </select>
      </div>
    </div>
  </div>

  <app-loader *ngIf="isLoading"></app-loader>

  <ng-container *ngIf="!isLoading">
    <div class="card border-0 shadow-sm">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>Servicio</th>
              <th>Barrio</th>
              <th>Categoría</th>
              <th>Destacado</th>
              <th class="text-end">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let s of filtered">
              <td class="fw-semibold">{{ s.serviceName }}</td>
              <td class="text-muted small">{{ s.neighborhood }}</td>
              <td>
                <span class="badge bg-light text-dark border">{{ s.categoryName }}</span>
              </td>
              <td>
                <span *ngIf="s.isFeatured" class="badge bg-warning text-dark">
                  <i class="bi bi-star-fill me-1"></i>Destacado
                </span>
                <span *ngIf="!s.isFeatured" class="text-muted small">—</span>
              </td>
              <td class="text-end">
                <a [routerLink]="['/services', s.id]" class="btn btn-sm btn-outline-primary me-1" title="Ver detalle">
                  <i class="bi bi-eye"></i>
                </a>
                <button class="btn btn-sm btn-outline-danger" (click)="requestDelete(s.id)" title="Eliminar">
                  <i class="bi bi-trash"></i>
                </button>
              </td>
            </tr>
            <tr *ngIf="filtered.length === 0">
              <td colspan="5" class="text-center text-muted py-4">No se encontraron servicios.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </ng-container>
</div>

<app-confirm-modal
  *ngIf="confirmDeleteId !== null"
  message="¿Estás seguro de que deseas eliminar este servicio? Esta acción no se puede deshacer."
  (confirmed)="confirmDelete()"
  (cancelled)="cancelDelete()">
</app-confirm-modal>
