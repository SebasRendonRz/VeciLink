<app-admin-topbar title="Categorías"></app-admin-topbar>

<div class="p-4">
  <app-alert *ngIf="alertMessage" [type]="alertType" [message]="alertMessage"
    (closed)="alertMessage = ''"></app-alert>

  <div class="d-flex justify-content-end mb-3">
    <button class="btn btn-primary btn-sm" (click)="openCreate()">
      <i class="bi bi-plus-lg me-1"></i>Nueva categoría
    </button>
  </div>

  <app-loader *ngIf="isLoading"></app-loader>

  <ng-container *ngIf="!isLoading">
    <div class="card border-0 shadow-sm">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>Nombre</th>
              <th>Ícono</th>
              <th>Descripción</th>
              <th class="text-end">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let cat of categories">
              <td class="fw-semibold">{{ cat.name }}</td>
              <td>
                <i *ngIf="cat.icon" class="bi {{ cat.icon }} fs-5 text-primary"></i>
                <span *ngIf="!cat.icon" class="text-muted small">—</span>
              </td>
              <td class="text-muted small">{{ cat.description || '—' }}</td>
              <td class="text-end">
                <button class="btn btn-sm btn-outline-secondary me-1" (click)="openEdit(cat)" title="Editar">
                  <i class="bi bi-pencil"></i>
                </button>
                <button class="btn btn-sm btn-outline-danger" (click)="requestDelete(cat.id)" title="Eliminar">
                  <i class="bi bi-trash"></i>
                </button>
              </td>
            </tr>
            <tr *ngIf="categories.length === 0">
              <td colspan="4" class="text-center text-muted py-4">No hay categorías.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </ng-container>
</div>

<!-- Modal Form -->
<div *ngIf="showForm" class="modal-backdrop-custom">
  <div class="modal-dialog-custom">
    <div class="modal-header-custom">
      <h5 class="mb-0 fw-bold">{{ editingId !== null ? 'Editar' : 'Nueva' }} categoría</h5>
      <button class="btn-close" (click)="showForm = false"></button>
    </div>
    <div class="modal-body-custom">
      <div class="mb-3">
        <label class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
        <input type="text" class="form-control" [(ngModel)]="formData.name" placeholder="Ej. Plomería">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Ícono Bootstrap</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi" [ngClass]="formData.icon || 'bi-image'"></i></span>
          <input type="text" class="form-control" [(ngModel)]="formData.icon" placeholder="Ej. bi-wrench">
        </div>
        <small class="text-muted">Clase de Bootstrap Icons (sin el punto).</small>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Descripción</label>
        <textarea class="form-control" rows="2" [(ngModel)]="formData.description"></textarea>
      </div>
    </div>
    <div class="modal-footer-custom">
      <button class="btn btn-secondary btn-sm" (click)="showForm = false">Cancelar</button>
      <button class="btn btn-primary btn-sm" (click)="saveForm()" [disabled]="!formData.name.trim()">Guardar</button>
    </div>
  </div>
</div>

<app-confirm-modal
  *ngIf="confirmDeleteId !== null"
  message="¿Estás seguro de que deseas eliminar esta categoría?"
  (confirmed)="confirmDelete()"
  (cancelled)="cancelDelete()">
</app-confirm-modal>
