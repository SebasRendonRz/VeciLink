<app-admin-topbar title="Prestadores destacados"></app-admin-topbar>

<div class="p-4">
  <app-alert *ngIf="alertMessage" [type]="alertType" [message]="alertMessage"
    (closed)="alertMessage = ''"></app-alert>

  <app-loader *ngIf="isLoading"></app-loader>

  <ng-container *ngIf="!isLoading">
    <div class="card border-0 shadow-sm">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>Prestador</th>
              <th>Barrio</th>
              <th>Calificación</th>
              <th>Destacado</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let p of providers">
              <td class="fw-semibold">{{ p.providerName }}</td>
              <td class="text-muted small">{{ p.neighborhood }}</td>
              <td>
                <span class="badge bg-warning text-dark">
                  <i class="bi bi-star-fill me-1"></i>{{ p.ratingAverage | number:'1.1-1' }}
                </span>
              </td>
              <td>
                <div class="form-check form-switch">
                  <input class="form-check-input" type="checkbox"
                    [checked]="p.isFeatured"
                    (change)="toggleFeatured(p)">
                  <label class="form-check-label small"
                    [ngClass]="p.isFeatured ? 'text-success fw-semibold' : 'text-muted'">
                    {{ p.isFeatured ? 'Destacado' : 'Normal' }}
                  </label>
                </div>
              </td>
            </tr>
            <tr *ngIf="providers.length === 0">
              <td colspan="4" class="text-center text-muted py-4">No hay prestadores.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </ng-container>
</div>
