<app-admin-topbar title="Reportes"></app-admin-topbar>

<div class="p-4">
  <app-alert *ngIf="alertMessage" [type]="alertType" [message]="alertMessage"
    (closed)="alertMessage = ''"></app-alert>

  <app-loader *ngIf="isLoading"></app-loader>

  <ng-container *ngIf="!isLoading">
    <div class="card border-0 shadow-sm">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>Tipo</th>
              <th>Motivo</th>
              <th>Estado</th>
              <th>Fecha</th>
              <th class="text-end">Cambiar estado</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let r of reports">
              <td>
                <span class="badge bg-light text-dark border">{{ reportType(r) }}</span>
              </td>
              <td class="text-muted small" style="max-width:260px;">{{ r.reason }}</td>
              <td>
                <span class="badge"
                  [ngClass]="{
                    'bg-warning text-dark': r.status === 'pending',
                    'bg-info text-dark':    r.status === 'reviewed',
                    'bg-success':           r.status === 'closed'
                  }">
                  {{ r.status === 'pending' ? 'Pendiente' : r.status === 'reviewed' ? 'Revisado' : 'Cerrado' }}
                </span>
              </td>
              <td class="text-muted small">{{ r.createdAt | date:'dd/MM/yyyy' }}</td>
              <td class="text-end">
                <select class="form-select form-select-sm w-auto d-inline-block"
                  [ngModel]="r.status"
                  (ngModelChange)="changeStatus(r, $event)">
                  <option value="pending">Pendiente</option>
                  <option value="reviewed">Revisado</option>
                  <option value="closed">Cerrado</option>
                </select>
              </td>
            </tr>
            <tr *ngIf="reports.length === 0">
              <td colspan="5" class="text-center text-muted py-4">No hay reportes.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </ng-container>
</div>
