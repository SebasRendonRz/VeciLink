<div class="page-container">
  <div class="container py-4" style="max-width: 600px;">
    <div class="d-flex align-items-center gap-2 mb-4">
      <button class="btn btn-outline-secondary btn-sm" (click)="location.back()">
        <i class="bi bi-arrow-left"></i>
      </button>
      <h1 class="h3 fw-bold mb-0">Reportar usuario</h1>
    </div>

    <app-alert *ngIf="successMessage" [message]="successMessage" type="success" (dismissed)="successMessage = ''"></app-alert>
    <app-alert *ngIf="errorMessage" [message]="errorMessage" type="danger" (dismissed)="errorMessage = ''"></app-alert>

    <div class="card border-0 shadow-sm p-4" *ngIf="!successMessage">
      <p class="text-muted mb-4">
        <i class="bi bi-shield-exclamation me-2 text-warning"></i>
        Tu reporte será revisado por nuestro equipo. Ayúdanos a mantener VeciLink seguro y confiable.
      </p>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
        <div class="mb-3">
          <label class="form-label">Motivo del reporte</label>
          <select class="form-select"
            [class.is-invalid]="f['reason'].invalid && f['reason'].touched"
            formControlName="reason">
            <option value="">Seleccionar motivo...</option>
            <option *ngFor="let r of reasons" [value]="r">{{ r }}</option>
          </select>
          <div class="invalid-feedback">Por favor selecciona un motivo.</div>
        </div>

        <div class="mb-4">
          <label class="form-label">Detalle adicional <span class="text-muted">(opcional)</span></label>
          <textarea class="form-control" formControlName="detail" rows="4"
            placeholder="Describe con más detalle el problema..."></textarea>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-danger" [disabled]="isSaving">
            <span *ngIf="isSaving" class="spinner-border spinner-border-sm me-2"></span>
            {{ isSaving ? 'Enviando...' : 'Enviar reporte' }}
          </button>
          <button type="button" class="btn btn-outline-secondary" (click)="location.back()">Cancelar</button>
        </div>
      </form>
    </div>
  </div>
</div>
