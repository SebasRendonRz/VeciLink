<div class="page-container">
  <div class="container py-4">
    <app-loader *ngIf="isLoading"></app-loader>

    <ng-container *ngIf="!isLoading">
      <!-- Cabecera -->
      <div class="d-flex align-items-center gap-3 mb-4 flex-wrap">
        <div class="provider-avatar bg-primary text-white rounded-circle d-flex align-items-center justify-content-center">
          <i class="bi bi-person fs-3"></i>
        </div>
        <div>
          <h1 class="h3 fw-bold mb-0">Bienvenido, {{ currentUser?.fullName }}</h1>
          <p class="text-muted mb-0" *ngIf="provider">{{ provider.providerName }}</p>
        </div>
        <app-featured-badge *ngIf="provider?.isFeatured" class="ms-auto"></app-featured-badge>
      </div>

      <!-- Estadísticas -->
      <app-provider-stats-summary [stats]="stats" [provider]="provider"></app-provider-stats-summary>

      <!-- Links rápidos -->
      <div class="row g-3 mt-4">
        <div class="col-12">
          <h5 class="fw-semibold mb-3">Acciones rápidas</h5>
        </div>
        <div class="col-6 col-md-3">
          <a routerLink="/provider/profile" class="quick-link card border-0 shadow-sm p-3 text-center text-decoration-none h-100">
            <i class="bi bi-person-gear fs-2 text-primary mb-2"></i>
            <p class="mb-0 fw-semibold small">Editar perfil</p>
          </a>
        </div>
        <div class="col-6 col-md-3">
          <a routerLink="/provider/services" class="quick-link card border-0 shadow-sm p-3 text-center text-decoration-none h-100">
            <i class="bi bi-grid fs-2 text-success mb-2"></i>
            <p class="mb-0 fw-semibold small">Mis servicios</p>
          </a>
        </div>
        <div class="col-6 col-md-3">
          <a routerLink="/provider/services/new" class="quick-link card border-0 shadow-sm p-3 text-center text-decoration-none h-100">
            <i class="bi bi-plus-circle fs-2 text-warning mb-2"></i>
            <p class="mb-0 fw-semibold small">Crear servicio</p>
          </a>
        </div>
        <div class="col-6 col-md-3">
          <a routerLink="/provider/requests" class="quick-link card border-0 shadow-sm p-3 text-center text-decoration-none h-100">
            <i class="bi bi-clock-history fs-2 text-info mb-2"></i>
            <p class="mb-0 fw-semibold small">Ver historial</p>
          </a>
        </div>
      </div>
    </ng-container>
  </div>
</div>
