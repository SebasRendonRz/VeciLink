<div class="page-container">
  <div class="container py-4" style="max-width: 720px;">
    <div class="d-flex align-items-center gap-2 mb-4">
      <a routerLink="/provider" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left"></i>
      </a>
      <h1 class="h3 fw-bold mb-0">Editar perfil del prestador</h1>
    </div>

    <app-loader *ngIf="isLoading"></app-loader>

    <ng-container *ngIf="!isLoading">
      <app-alert *ngIf="successMessage" [message]="successMessage" type="success" (dismissed)="successMessage = ''"></app-alert>
      <app-alert *ngIf="errorMessage" [message]="errorMessage" type="danger" (dismissed)="errorMessage = ''"></app-alert>

      <!-- Estado destacado -->
      <div class="alert alert-warning d-flex align-items-center gap-2" *ngIf="provider?.isFeatured">
        <i class="bi bi-patch-check-fill"></i>
        <span>Tu perfil está marcado como <strong>destacado</strong>.</span>
      </div>

      <div class="card border-0 shadow-sm p-4">
        <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
          <div class="row g-3">

            <div class="col-12">
              <label class="form-label">Nombre del negocio / prestador</label>
              <input type="text" class="form-control"
                [class.is-invalid]="f['providerName'].invalid && f['providerName'].touched"
                formControlName="providerName">
              <div class="invalid-feedback">El nombre es requerido.</div>
            </div>

            <div class="col-md-6">
              <label class="form-label">WhatsApp</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-whatsapp text-success"></i></span>
                <input type="tel" class="form-control"
                  [class.is-invalid]="f['whatsapp'].invalid && f['whatsapp'].touched"
                  formControlName="whatsapp" placeholder="Ej. 3001234567">
              </div>
              <div class="text-danger small mt-1" *ngIf="f['whatsapp'].invalid && f['whatsapp'].touched">
                El WhatsApp es requerido.
              </div>
            </div>

            <div class="col-md-6">
              <label class="form-label">Barrio</label>
              <input type="text" class="form-control"
                [class.is-invalid]="f['neighborhood'].invalid && f['neighborhood'].touched"
                formControlName="neighborhood">
              <div class="invalid-feedback">El barrio es requerido.</div>
            </div>

            <div class="col-md-6">
              <label class="form-label">Zona <span class="text-muted">(opcional)</span></label>
              <input type="text" class="form-control" formControlName="zone" placeholder="Ej. Norte, Sur, Centro">
            </div>

            <div class="col-md-6">
              <label class="form-label">Horario de atención</label>
              <input type="text" class="form-control"
                [class.is-invalid]="f['schedule'].invalid && f['schedule'].touched"
                formControlName="schedule" placeholder="Ej. Lun-Vie 8am-6pm">
              <div class="invalid-feedback">El horario es requerido.</div>
            </div>

            <div class="col-md-6">
              <label class="form-label">Disponibilidad</label>
              <select class="form-select"
                [class.is-invalid]="f['availability'].invalid && f['availability'].touched"
                formControlName="availability">
                <option value="">Seleccionar...</option>
                <option value="Inmediata">Inmediata</option>
                <option value="Con cita previa">Con cita previa</option>
                <option value="Misma semana">Misma semana</option>
                <option value="Próxima semana">Próxima semana</option>
                <option value="Urgencias 24h">Urgencias 24h</option>
              </select>
              <div class="invalid-feedback">La disponibilidad es requerida.</div>
            </div>

            <div class="col-12">
              <label class="form-label">Descripción <span class="text-muted">(opcional)</span></label>
              <textarea class="form-control" formControlName="description" rows="3"
                placeholder="Describe tus servicios, experiencia y especialidades..."></textarea>
            </div>

            <div class="col-12">
              <label class="form-label">URL de foto de perfil <span class="text-muted">(opcional)</span></label>
              <input type="url" class="form-control" formControlName="photoUrl" placeholder="https://...">
            </div>

            <div class="col-12 mt-2 d-grid d-md-block">
              <button type="submit" class="btn btn-primary" [disabled]="isSaving">
                <span *ngIf="isSaving" class="spinner-border spinner-border-sm me-2"></span>
                {{ isSaving ? 'Guardando...' : 'Guardar cambios' }}
              </button>
            </div>

          </div>
        </form>
      </div>
    </ng-container>
  </div>
</div>
