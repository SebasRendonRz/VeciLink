<div class="page-container">
  <div class="container py-4">
    <div class="d-flex align-items-center gap-2 mb-4">
      <a routerLink="/provider" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left"></i>
      </a>
      <h1 class="h3 fw-bold mb-0">Historial de solicitudes</h1>
    </div>

    <app-loader *ngIf="isLoading"></app-loader>

    <ng-container *ngIf="!isLoading">
      <div *ngIf="requests.length === 0" class="text-center py-5">
        <i class="bi bi-inbox display-3 text-muted"></i>
        <p class="mt-3 text-muted">No has recibido solicitudes todavía.</p>
      </div>

      <div class="card border-0 shadow-sm" *ngIf="requests.length > 0">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th scope="col">#</th>
                <th scope="col">Servicio ID</th>
                <th scope="col">Estado</th>
                <th scope="col">Fecha</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let req of requests">
                <td class="text-muted small">{{ req.id }}</td>
                <td>
                  <span class="fw-semibold">Servicio #{{ req.serviceId }}</span>
                </td>
                <td>
                  <span class="badge rounded-pill" [ngClass]="statusBadge[req.status]">
                    {{ statusLabels[req.status] || req.status }}
                  </span>
                </td>
                <td class="text-muted small">{{ req.createdAt | date:'mediumDate' }}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <p class="text-muted small mt-3">
        <i class="bi bi-info-circle me-1"></i>
        Las solicitudes muestran cuándo los ciudadanos han contactado tus servicios.
      </p>
    </ng-container>
  </div>
</div>
