<div class="notification-item d-flex gap-3 p-3 rounded" [class.unread]="!notification.isRead"
  [class.read]="notification.isRead">

  <div class="notif-icon d-flex align-items-center justify-content-center rounded-circle flex-shrink-0"
    [class.bg-info]="notification.type === 'info'" [class.bg-success]="notification.type === 'success'"
    [class.bg-warning]="notification.type === 'warning'" [class.bg-danger]="notification.type === 'error'">
    <i class="bi text-white" [class.bi-info-circle]="notification.type === 'info'"
      [class.bi-check-circle]="notification.type === 'success'"
      [class.bi-exclamation-triangle]="notification.type === 'warning'"
      [class.bi-x-circle]="notification.type === 'error'">
    </i>
  </div>

  <div class="flex-grow-1">
    <div class="d-flex justify-content-between align-items-start">
      <p class="fw-semibold mb-0" [class.text-dark]="!notification.isRead" [class.text-muted]="notification.isRead">
        {{ notification.title }}
      </p>
      <small class="text-muted ms-2 flex-shrink-0">{{ notification.createdAt | date:'mediumDate' }}</small>
    </div>
    <p class="small text-muted mb-0">{{ notification.message }}</p>
  </div>

  @if (!notification.isRead) {
  <button class="btn btn-link btn-sm text-muted p-0 flex-shrink-0 align-self-center"
    title="Marcar como leído" (click)="markRead.emit(notification.id)">
    <i class="bi bi-check2"></i>
  </button>
  }
</div>
