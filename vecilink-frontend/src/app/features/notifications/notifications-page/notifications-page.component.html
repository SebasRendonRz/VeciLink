<div class="page-container">
  <div class="container py-4" style="max-width: 760px;">
    <div class="d-flex align-items-center justify-content-between mb-4">
      <h1 class="h3 fw-bold mb-0">
        <i class="bi bi-bell me-2 text-primary"></i>Notificaciones
        @if (unreadCount > 0) {
        <span class="badge bg-danger ms-2 fs-6">{{ unreadCount }}</span>
        }
      </h1>
      @if (unreadCount > 0) {
      <button class="btn btn-outline-secondary btn-sm" (click)="markAllAsRead()">
        <i class="bi bi-check2-all me-1"></i>Marcar todas como leídas
      </button>
      }
    </div>

    @if (isLoading) {
    <app-loader></app-loader>
    }

    @if (!isLoading) {
    @if (notifications.length === 0) {
    <app-empty-state icon="bi-bell-slash" title="Sin notificaciones"
      message="No tienes notificaciones en este momento.">
    </app-empty-state>
    }

    @if (notifications.length > 0) {
    <app-notification-list [notifications]="notifications" (markRead)="onMarkRead($event)">
    </app-notification-list>
    }
    }
  </div>
</div>
