<div class="page-container">
  <div class="container py-4" style="max-width: 760px;">
    <div class="d-flex align-items-center justify-content-between mb-4">
      <h1 class="h3 fw-bold mb-0">
        <i class="bi bi-bell me-2 text-primary"></i>Notificaciones
        <span *ngIf="unreadCount > 0" class="badge bg-danger ms-2 fs-6">{{ unreadCount }}</span>
      </h1>
      <button *ngIf="unreadCount > 0" class="btn btn-outline-secondary btn-sm" (click)="markAllAsRead()">
        <i class="bi bi-check2-all me-1"></i>Marcar todas como leídas
      </button>
    </div>

    <app-loader *ngIf="isLoading"></app-loader>

    <ng-container *ngIf="!isLoading">
      <app-empty-state
        *ngIf="notifications.length === 0"
        icon="bi-bell-slash"
        title="Sin notificaciones"
        message="No tienes notificaciones en este momento.">
      </app-empty-state>

      <app-notification-list
        *ngIf="notifications.length > 0"
        [notifications]="notifications"
        (markRead)="onMarkRead($event)">
      </app-notification-list>
    </ng-container>
  </div>
</div>
