<section class="py-5">
  <div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="section-title mb-0">Servicios destacados</h2>
      <a routerLink="/services" class="btn btn-outline-primary btn-sm">Ver todos</a>
    </div>
    <div class="row g-3">
      <div class="col-12 col-sm-6 col-lg-4" *ngFor="let service of featuredServices">
        <app-service-card
          [service]="service"
          [isFavorite]="favoriteIds.has(service.id)"
          (favoriteToggled)="onFavoriteToggled($event)">
        </app-service-card>
      </div>
    </div>
    <app-empty-state
      *ngIf="featuredServices.length === 0"
      icon="bi-star"
      title="Sin servicios destacados"
      message="Próximamente encontrarás servicios destacados aquí.">
    </app-empty-state>
  </div>
</section>
