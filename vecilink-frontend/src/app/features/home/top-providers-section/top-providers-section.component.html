<section class="py-5 bg-light">
  <div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="section-title mb-0">Mejores prestadores</h2>
      <a routerLink="/ranking" class="btn btn-outline-primary btn-sm">Ver ranking</a>
    </div>
    <div class="row g-3 justify-content-center">
      @for (provider of topProviders; let i = $index; track provider.id) {
      <div class="col-12 col-sm-6 col-lg-4">
        <app-provider-card [provider]="provider" [rank]="i + 1"></app-provider-card>
      </div>
      }
    </div>
  </div>
</section>
