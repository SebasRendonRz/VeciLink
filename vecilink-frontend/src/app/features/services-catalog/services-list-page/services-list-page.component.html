<div class="page-container">
  <div class="container py-4">
    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
      <h1 class="h3 fw-bold mb-0">Catálogo de servicios</h1>
      <button class="btn btn-outline-secondary btn-sm" (click)="toggleView()">
        <i class="bi {{ showMap ? 'bi-grid' : 'bi-map' }} me-1"></i>
        {{ showMap ? 'Ver lista' : 'Ver mapa' }}
      </button>
    </div>

    <!-- Filtros -->
    <app-search-filters (filtersChanged)="onFiltersChanged($event)"></app-search-filters>

    <div class="mt-4">
      <!-- Loader -->
      @if (isLoading) {
      <app-loader></app-loader>
      }

      <!-- Vista mapa -->
      @if (!isLoading && showMap) {
      <app-service-map-view [services]="allServices">
      </app-service-map-view>
      }

      <!-- Vista lista -->
      @if (!isLoading && !showMap) {
      <!-- Resultados vacíos -->
      @if (allServices.length === 0) {
      <app-empty-state icon="bi-search" title="Sin resultados"
        message="No se encontraron servicios con los filtros seleccionados. Intenta con otros términos.">
      </app-empty-state>
      }

      <!-- Grilla de tarjetas -->
      @if (allServices.length > 0) {
      <div class="row g-3">
        @for (service of displayedServices; track service.id) {
        <app-service-card [service]="service" [isFavorite]="favoriteIds.has(service.id)"
          (favoriteToggled)="onFavoriteToggled($event)">
        </app-service-card>
        }
      </div>
      }
      }
    </div>

    <!-- Paginación -->
    @if (totalPages > 1) {
    <div class="mt-4">
      <app-pagination [currentPage]="currentPage" [totalPages]="totalPages" (pageChanged)="onPageChanged($event)">
      </app-pagination>
    </div>
    }
  </div>
</div>
