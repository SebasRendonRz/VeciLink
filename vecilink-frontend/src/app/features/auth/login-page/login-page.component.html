<div class="login-bg d-flex align-items-center justify-content-center min-vh-100">
  <div class="login-card card shadow-sm p-4">
    <div class="text-center mb-4">
      <img src="LogoVeciLink.png" alt="VeciLink" class="logo-login mb-2">
      <h1 class="h4 fw-bold mb-0">Ingresar</h1>
      <p class="text-muted small">Bienvenido de nuevo</p>
    </div>

    @if (errorMessage) {
    <app-alert [message]="errorMessage" type="danger" (dismissed)="errorMessage = ''">
    </app-alert>
    }

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
      <!-- Correo -->
      <div class="mb-3">
        <label for="email" class="form-label">Correo electrónico</label>
        <input id="email" type="email" class="form-control" [class.is-invalid]="email.invalid && email.touched"
          formControlName="email" placeholder="correo@ejemplo.com" autocomplete="email">
        <div class="invalid-feedback">
          @if (email.errors?.['required']) {
          <span>El correo es requerido.</span>
          }
          @if (email.errors?.['email']) {
          <span>Ingresa un correo válido.</span>
          }
        </div>
      </div>

      <!-- Contraseña -->
      <div class="mb-4">
        <label for="password" class="form-label">Contraseña</label>
        <input id="password" type="password" class="form-control"
          [class.is-invalid]="password.invalid && password.touched" formControlName="password"
          placeholder="Tu contraseña" autocomplete="current-password">
        <div class="invalid-feedback">
          @if (password.errors?.['required']) {
          <span>La contraseña es requerida.</span>
          }
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100" [disabled]="isLoading">
        @if (isLoading) {
        <span class="spinner-border spinner-border-sm me-2"></span>
        }
        {{ isLoading ? 'Ingresando...' : 'Ingresar' }}
      </button>
    </form>

    <hr class="my-3">
    <p class="text-center small mb-0">
      ¿No tienes cuenta?
      <a routerLink="/register" class="link-primary fw-semibold">Regístrate aquí</a>
    </p>
  </div>
</div>
