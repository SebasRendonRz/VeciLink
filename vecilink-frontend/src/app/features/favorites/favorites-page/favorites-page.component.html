<div class="page-container">
  <div class="container py-4">
    <h1 class="h3 fw-bold mb-4"><i class="bi bi-heart-fill text-danger me-2"></i>Mis favoritos</h1>

    @if (isLoading) {
    <app-loader></app-loader>
    }

    @if (!isLoading) {
    @if (favoriteServices.length === 0) {
    <app-empty-state icon="bi-heart" title="Sin favoritos aún"
      message="Guarda servicios como favoritos para encontrarlos fácilmente aquí.">
    </app-empty-state>
    }

    @if (favoriteServices.length > 0) {
    <app-favorite-service-list [services]="favoriteServices" (favoriteToggled)="onFavoriteToggled($event)">
    </app-favorite-service-list>
    }
    }
  </div>
