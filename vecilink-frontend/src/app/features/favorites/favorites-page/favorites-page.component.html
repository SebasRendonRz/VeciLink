<div class="page-container">
  <div class="container py-4">
    <h1 class="h3 fw-bold mb-4"><i class="bi bi-heart-fill text-danger me-2"></i>Mis favoritos</h1>

    <app-loader *ngIf="isLoading"></app-loader>

    <ng-container *ngIf="!isLoading">
      <app-empty-state
        *ngIf="favoriteServices.length === 0"
        icon="bi-heart"
        title="Sin favoritos aún"
        message="Guarda servicios como favoritos para encontrarlos fácilmente aquí.">
      </app-empty-state>

      <app-favorite-service-list
        *ngIf="favoriteServices.length > 0"
        [services]="favoriteServices"
        (favoriteToggled)="onFavoriteToggled($event)">
      </app-favorite-service-list>
    </ng-container>
  </div>
</div>
